services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netcare-app
    restart: always
    ports:
      - "3000:3000" # Exposed for Host Nginx
    environment:
      - DATABASE_URI=mongodb://${MONGO_ROOT_USER}:Cont%40ct%40123@mongo:27017/${DB_NAME}?authSource=admin
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - NEXT_PUBLIC_SERVER_URL=https://www.netcarenepal.com
      - RESEND_API_KEY=${RESEND_API_KEY}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - NODE_ENV=production
    depends_on:
      - mongo
    volumes:
      - ./media:/app/media

  mongo:
    image: mongo:latest
    container_name: netcare-mongo
    restart: always
    # No ports exposed to host for security; app connects via Docker network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - netcare-db-data:/data/db

volumes:
  netcare-db-data:
